<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="40" x2="800" y2="40" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Snorlax sleeping icon -->
  <g transform="translate(190, 52)">
    <!-- Kubernetes-style hexagon with sleeping face -->
    <path d="M48 8 L84 28 L84 68 L48 88 L12 68 L12 28 Z" fill="url(#accent)" opacity="0.15" stroke="url(#accent)" stroke-width="2"/>
    <!-- Sleeping eyes (closed lines) -->
    <line x1="34" y1="42" x2="44" y2="42" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="52" y1="42" x2="62" y2="42" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Smile -->
    <path d="M40 54 Q48 62 56 54" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
    <!-- Zzz -->
    <g fill="#a78bfa" font-family="monospace" font-weight="bold" opacity="0.8">
      <text x="68" y="30" font-size="14">z</text>
      <text x="78" y="20" font-size="11" opacity="0.6">z</text>
      <text x="85" y="12" font-size="8" opacity="0.4">z</text>
    </g>
  </g>

  <!-- Project name -->
  <text x="290" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="48" font-weight="700" fill="#e6edf3" letter-spacing="-1">kube-snorlax</text>

  <!-- Tagline -->
  <text x="290" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#8b949e">Scale to zero. Wake on request.</text>

  <!-- Small kubernetes + moon icons decorative -->
  <g transform="translate(290, 138)" opacity="0.5">
    <rect width="60" height="20" rx="10" fill="#a78bfa" opacity="0.15"/>
    <text x="30" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">☸ k8s</text>
  </g>
  <g transform="translate(358, 138)" opacity="0.5">
    <rect width="68" height="20" rx="10" fill="#4ade80" opacity="0.15"/>
    <text x="34" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">😴 sleep</text>
  </g>
  <g transform="translate(434, 138)" opacity="0.5">
    <rect width="68" height="20" rx="10" fill="#38bdf8" opacity="0.15"/>
    <text x="34" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#38bdf8">☀️ wake</text>
  </g>
</svg>
