name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "minor"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ───────────────────────────────────────────────
  # Job 1: Bump version, create tag + GitHub Release
  # ───────────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      new_tag: ${{ steps.version.outputs.new }}
      new_version: ${{ steps.version.outputs.new_bare }}
      prev_tag: ${{ steps.version.outputs.latest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type
        id: bump
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            echo "type=minor" >> "$GITHUB_OUTPUT"
          fi

      - name: Get latest version and bump
        id: version
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [[ -z "$LATEST" ]]; then
            LATEST="v0.0.0"
          fi
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

          VER="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"

          BUMP="${{ steps.bump.outputs.type }}"
          if [[ "$BUMP" == "major" ]]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [[ "$BUMP" == "minor" ]]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          echo "new=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "new_bare=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "Bumping $LATEST → v${MAJOR}.${MINOR}.${PATCH} ($BUMP)"

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.new_bare }}/" helm/kube-snorlax/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.new_bare }}\"/" helm/kube-snorlax/Chart.yaml
          cat helm/kube-snorlax/Chart.yaml

      - name: Commit version bump
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add helm/kube-snorlax/Chart.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git push

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.new }}
          git push origin ${{ steps.version.outputs.new }}

      - name: Generate release notes
        id: notes
        run: |
          PREV="${{ steps.version.outputs.latest }}"
          if [[ "$PREV" == "v0.0.0" ]]; then
            NOTES="Initial release"
          else
            NOTES=$(git log ${PREV}..HEAD~1 --pretty=format:"- %s" --no-merges 2>/dev/null || echo "- Release ${{ steps.version.outputs.new }}")
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new }}
          name: ${{ steps.version.outputs.new }}
          body: |
            ## What's Changed

            ${{ steps.notes.outputs.notes }}

            ## Install / Upgrade

            ```bash
            # Helm
            helm repo add kube-snorlax https://vineethvijay.github.io/kube-snorlax
            helm repo update
            helm upgrade --install kube-snorlax kube-snorlax/kube-snorlax --version ${{ steps.version.outputs.new_bare }}

            # Docker
            docker pull ghcr.io/vineethvijay/kube-snorlax:${{ steps.version.outputs.new_bare }}
            ```
          generate_release_notes: false

  # ───────────────────────────────────────────────
  # Job 2: Build + push Docker image
  # ───────────────────────────────────────────────
  docker:
    needs: version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.new_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ───────────────────────────────────────────────
  # Job 3: Package + release Helm chart
  # ───────────────────────────────────────────────
  helm:
    needs: version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_tag }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: helm
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  # ───────────────────────────────────────────────
  # Job 4: Deploy GitHub Pages (docs + chart index)
  # ───────────────────────────────────────────────
  pages:
    needs: helm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Checkout gh-pages for chart index
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-branch
        continue-on-error: true

      - name: Merge docs + chart index
        run: |
          mkdir -p _site
          cp -r docs/* _site/
          cp gh-pages-branch/index.yaml _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
